<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Effects</title>
  <style>
    /* Mobile-first 412px stage. Showcases NativeUI's effects/clip/transform surface. */
    body { position: relative; width: 412px; height: 915px; margin: 0;
           background: #0f1117; color: #e7eaf0; font-family: Inter, system-ui, sans-serif; }
    #screen { display: flex; flex-direction: column; gap: 22px; padding: 20px; }
    .caption { font-size: 13px; font-weight: 600; color: #8a93a6; }

    /* 1. Circular avatar: square box + border-radius:50% => circle (resolves against min(w,h)).
       overflow:hidden clips the inner full-bleed gradient to the rounded shape on every lane. */
    .avatar { width: 96px; height: 96px; border-radius: 50%; overflow: hidden;
              border: 3px dashed #5b8cff; }
    .avatar-fill { width: 100%; height: 100%;
                   background: linear-gradient(135deg, #2f6bff 0%, #00c2ff 100%); }

    /* 2. Inset (inner) box-shadow => InnerShadow. Outer offset/blur/spread => DropShadow. */
    .well { width: 100%; height: 64px; border-radius: 14px; background: #1c2230;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.55); }

    /* 3. filter:blur() renders on all four lanes (the only filter function that does). */
    .blur-row { display: flex; gap: 16px; align-items: center; }
    .tile { width: 96px; height: 72px; border-radius: 16px; flex: none;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 700;
            background: linear-gradient(135deg, #7c5cff, #ff5c93); }
    .tile.is-blurred { filter: blur(6px); }

    /* 4. clip-path:polygon() carves the box to an arbitrary shape. */
    .clip-row { display: flex; gap: 16px; align-items: center; }
    .pentagon { width: 96px; height: 96px; flex: none;
                background: linear-gradient(135deg, #8a5cff, #ff7ad9);
                clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }

    /* 5. transform rotate/scale pivot at the element centre; paint-only, layout unchanged. */
    .badge { position: relative; width: 96px; height: 72px; border-radius: 12px;
             background: #161b27; transform: rotate(-6deg) scale(1.06); }
    .badge .pip { position: absolute; top: -8px; right: -8px; width: 28px; height: 28px;
                  border-radius: 50%; background: #ef4444; color: #fff; font-size: 13px;
                  display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <main id="screen">
    <div class="caption">Circular avatar — border-radius:50% + overflow:hidden + inner gradient</div>
    <div class="avatar" id="avatar"><div class="avatar-fill"></div></div>

    <div class="caption">Inset box-shadow (inner shadow well)</div>
    <div class="well" id="well"></div>

    <div class="caption">filter: blur() — sharp vs blurred tile</div>
    <div class="blur-row">
      <div class="tile">Sharp</div>
      <div class="tile is-blurred">Blur</div>
    </div>

    <div class="caption">clip-path: polygon() shape</div>
    <div class="clip-row"><div class="pentagon" id="pentagon"></div></div>

    <div class="caption">transform: rotate + scale (centre pivot)</div>
    <div class="clip-row"><div class="badge" id="badge"><div class="pip">9</div></div></div>
  </main>
</body>
</html>
