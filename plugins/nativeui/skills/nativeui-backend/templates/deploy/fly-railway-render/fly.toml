# NativeUI backend on Fly.io. `fly launch` generates this; the values below are the ones that matter.
# Rename "app" to your unique app name (or let `fly launch` pick one).
app = "nui-backend"
primary_region = "iad"   # pick one near your users: fly platform regions

[build]
  dockerfile = "Dockerfile"   # reuse ../cloud-run/Dockerfile (copy it next to this file)

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true     # scale to zero when idle
  auto_start_machines = true
  min_machines_running = 0      # set 1 to avoid cold starts

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
