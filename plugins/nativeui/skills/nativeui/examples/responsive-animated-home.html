<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <style>
    /* Mobile-first: 412px stage. */
    body { position: relative; width: 412px; height: 915px; margin: 0;
           background: linear-gradient(180deg, #0f172a, #1e293b);
           font-family: Inter, system-ui, sans-serif; color: #e2e8f0; }

    #header { display: flex; align-items: center; justify-content: space-between;
              height: 64px; padding: 0 20px; }
    #title { font-size: 22px; font-weight: 700; margin: 0; }
    /* a pulsing "live" dot — @keyframes -> NativeUI timeline (runs on device) */
    #live_dot { width: 12px; height: 12px; border-radius: 6px; background: #22c55e;
                animation: pulse 1.4s ease-in-out infinite alternate; }
    @keyframes pulse { from { opacity: .35; } to { opacity: 1; } }

    /* hero slides in on load; relative + left => translate (no layout disturbance) */
    #hero { position: relative; margin: 8px 20px 16px; padding: 20px; border-radius: 18px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            box-shadow: 0 10px 30px rgba(99,102,241,.35);
            animation: slideIn 2.4s ease-in-out infinite; }
    @keyframes slideIn { 0% { left: 0; opacity: .6; } 100% { left: 16px; opacity: 1; } }
    #hero_value { font-size: 32px; font-weight: 800; margin: 4px 0 0; }

    /* responsive stat grid: 1-col on phone, 2-col on tablet, 3-col on desktop */
    #stats { display: flex; flex-direction: column; gap: 12px; padding: 0 20px; }
    .stat  { width: 100%; padding: 16px; border-radius: 14px; background: #1f2937; }
    .stat_n { font-size: 24px; font-weight: 700; }
    @media (min-width: 600px) { #stats { flex-direction: row; flex-wrap: wrap; } .stat { width: calc(50% - 6px); } }
    @media (min-width: 900px) { .stat { width: calc(33.33% - 8px); } }

    #cta { display: block; margin: 20px; padding: 14px; border: none; border-radius: 12px;
           background: #6366f1; color: #fff; font-size: 16px; font-weight: 600; }
    #cta:hover { animation: glow .4s ease-in forwards; }
    @keyframes glow { to { background: #ec4899; } }
  </style>
</head>
<body>
  <header id="header">
    <h1 id="title">Dashboard</h1>
    <div id="live_dot"></div>
  </header>

  <section id="hero">
    <div id="hero_label">Revenue today</div>
    <div id="hero_value">$12,840</div>
  </section>

  <main id="stats">
    <div class="stat" id="stat_orders"><div id="stat_orders_n" class="stat_n">320</div>Orders</div>
    <div class="stat" id="stat_users"><div id="stat_users_n" class="stat_n">1,204</div>Active users</div>
    <div class="stat" id="stat_refunds"><div id="stat_refunds_n" class="stat_n">7</div>Refunds</div>
  </main>

  <!-- letter-first id => typed accessor on both natives; wire in NuiBackend, not here -->
  <button id="refresh_button" type="button">Refresh data</button>
  <a id="cta" href="#detail">View full report</a>
</body>
</html>
